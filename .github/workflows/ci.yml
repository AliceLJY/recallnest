name: CI

on:
  push:
    branches: [main, eval-canary-p0]
  pull_request:
    branches: [main, eval-canary-p0]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Setup config
        run: cp config.json.example config.json

      - name: Doctor (CI mode)
        run: bun run src/cli.ts doctor --ci

      - name: Test suite
        run: bun test

      - name: TypeScript check
        # bundle-to-outdir so the exit code is meaningful: 0 on success, non-0 on a real
        # import/transpile error anywhere in the graph. (The old `--no-bundle` single-entry
        # form always exited 1 via a bun output-filename quirk, which is why `|| true`
        # was masking it — it was hiding a broken command, not real failures.)
        run: bun build src/cli.ts --target bun --outdir /tmp/ts-check
